server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA fallback: unknown paths return index.html (React handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"               always;
    add_header X-Content-Type-Options  "nosniff"                  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(self), geolocation=(self)" always;
    # HSTS is set by Traefik (EasyPanel) at the edge. Don't duplicate here.

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Cache static assets (Vite hashes filenames — safe to cache forever)
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML should never be cached — new deploys must be picked up immediately
    location = /index.html {
        add_header  Cache-Control "no-store, must-revalidate";
        expires     off;
    }
}
