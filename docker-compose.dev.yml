# Development-only docker-compose.
# Production deploy goes through EasyPanel (see nova4a-rebuild-plan.md Fase 8).
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.dev.yml down
#   docker compose -f docker-compose.dev.yml logs -f api

services:
  # ── PostgreSQL 16 ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nova-postgres
    environment:
      POSTGRES_DB: nova
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: dev_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d nova"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nova-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage) ────────────
  minio:
    image: minio/minio
    container_name: nova-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console (http://localhost:9001)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── FastAPI backend ──────────────────────────────────
  api:
    build:
      context: ./apps/api
    container_name: nova-api
    environment:
      ENV: development
      DATABASE_URL: postgresql+asyncpg://nova:dev_pass@postgres:5432/nova
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_change_in_prod
      JWT_ALGORITHM: HS256
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: nova-dev
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_PUBLIC_URL: http://localhost:9000/nova-dev
      APP_URL: http://localhost:5173
      API_URL: http://localhost:8000
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot reload — mount source. Dockerfile deps stay baked in.
      - ./apps/api/app:/app/app
      - ./apps/api/alembic:/app/alembic
      - ./apps/api/alembic.ini:/app/alembic.ini
      - ./apps/api/pyproject.toml:/app/pyproject.toml
    # Override Dockerfile CMD to enable --reload in dev
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
